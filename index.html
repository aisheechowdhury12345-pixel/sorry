
<!DOCTYPE html>
<html>
<head>
  <title>Compatibility Checker</title>
</head>

<body style="text-align:center; font-family:Arial; margin-top:80px;">

  <h1>💘 Compatibility Checker 💘</h1>

  <input type="text" id="name1" placeholder="First Name"><br><br>
  <input type="text" id="name2" placeholder="Second Name"><br><br>

  <button onclick="checkCompatibility()" 
          style="padding:10px 20px; font-size:16px;">
    Check Compatibility
  </button>

  <p id="result" style="margin-top:20px; font-size:20px;"></p>

  <script>
    function checkCompatibility() {
      let name1 = document.getElementById("name1").value.trim().toLowerCase();
      let name2 = document.getElementById("name2").value.trim().toLowerCase();

      if (name1 === "" || name2 === "") {
        document.getElementById("result").innerText =
        "Please enter both names.";
        return;
      }

      let yourName = "yournamehere";  // <-- CHANGE THIS

      let percentage;

      if (name1 === yourName || name2 === yourName) {
        percentage = 100;
      } else {
        percentage = Math.floor(Math.random() * 101);
      }

      document.getElementById("result").innerText =
        name1 + " ❤️ " + name2 + " = " + percentage + "% Compatibility";
    }
  </script>

</body>
</html>
