<!DOCTYPE html>
<html>
<head>
    <title>Sorry ❤️</title>
    <style>
        body {
            background: linear-gradient(to right, #ffcccc, #ffe6e6);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        h1 {
            font-size: 100px;
            color: red;
            animation: beat 1s infinite;
        }
        @keyframes beat {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <h1>SORRY ❤️</h1>
</body>
</html>
